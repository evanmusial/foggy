name: foggy

services:
  foggy:
    build: .
    image: foggy:local
    restart: unless-stopped
    environment:
      FOGGY_ADDR: ":8080"
      FOGGY_DATA_DIR: /data
      FOGGY_ORIGIN: ${FOGGY_ORIGIN:-http://localhost:8080}
      FOGGY_RP_ID: ${FOGGY_RP_ID:-localhost}
      FOGGY_REQUIRE_HTTPS: ${FOGGY_REQUIRE_HTTPS:-true}
      FOGGY_DEV_AUTO_AUTH: ${FOGGY_DEV_AUTO_AUTH:-false}
      FOGGY_DEV_AUTO_PASSWORD: ${FOGGY_DEV_AUTO_PASSWORD:-}
    ports:
      - "${FOGGY_PORT:-8080}:8080"
    volumes:
      - ./data:/data
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  caddy:
    image: caddy:2.8-alpine
    profiles: ["tls"]
    restart: unless-stopped
    depends_on:
      - foggy
    environment:
      FOGGY_DOMAIN: ${FOGGY_DOMAIN}
      FOGGY_ADMIN_EMAIL: ${FOGGY_ADMIN_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  caddy-data:
  caddy-config:
